name: Claude Issue Triage
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  triage-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && github.event.comment.user.type != 'Bot')
    concurrency:
      group: issue-triage-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code for Issue Triage
        timeout-minutes: 5
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are an issue triage bot for KupoDB, a free public API for Final Fantasy Trading Card Game data.

            Analyze this issue and apply the appropriate labels. The issue is #${{ github.event.issue.number }} in ${{ github.repository }}.

            ## Label Taxonomy

            **Feature area labels** (based on Feature Area dropdown or content):
            - `api` — API endpoint or response issue
            - `card data` — Card data issue (metadata, images)
            - `card pricing` — Incorrect or missing price data
            - `missing card` — Card not found or missing from database
            - `website` — Frontend/website issue
            - `documentation` — Documentation issue

            **Card data sub-labels** (for card-data issues, based on Issue Type dropdown):
            - `card pricing` — Incorrect Pricing
            - `missing card` — Missing Card

            **Issue type labels** (may reclassify based on content):
            - `feat` — New feature request (keep if truly new)
            - `enhancement` — Improvement to existing feature (reclassify from `feat` if appropriate)
            - `request` — Community request or suggestion

            **Always apply on new issues:**
            - `triage` — Mark for team review

            ## Instructions

            1. Read the issue title, body, and any template dropdown selections.
            2. Apply the appropriate feature area label(s).
            3. For card-data issues, apply the appropriate sub-label.
            4. If this is a new issue (not a comment update), apply the `triage` label.
            5. For feature requests, assess whether it's truly new (`feat`) or an improvement to something that exists (`enhancement`).
            6. Do NOT remove labels that were applied by the template itself (like `bug`, `feat`, `card data`, `documentation`).
            7. Do NOT apply priority labels (`critical`) — those are for the team only.

            Apply labels silently. Do not post a comment.
